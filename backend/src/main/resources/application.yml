spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dot_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 7062a7ab01a5af6ce0e4bcc557024560
            client-secret: HSnjnDQNpYg0DAFRBr0Xd8Bnac32QzZj
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            redirect-uri: "{baseUrl}/login/oauth2/code/github"
            scope:
              - user:email
              - read:user
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: dot-project-secret-key-2026-random-string-abcdefghijklmn
  expiration: 86400000  # 24시간 (ms)

openai:
  api-key: ${OPENAI_API_KEY:placeholder}
  model: gpt-4o-mini

app:
  frontend-url: http://localhost:5173

server:
  port: 8080

logging:
  level:
    com.dot: DEBUG
    org.springframework.security: DEBUG
